name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      # The compat-data source is a separate private repo, cloned with a
      # read-only deploy key (secret COMPAT_DATA_DEPLOY_KEY). The checkout is
      # non-fatal and the build is gated on its success, so a transient source
      # outage skips the drift check rather than failing the whole run.
      - name: Check out compat-data source
        id: compat_src
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: cezaraugusto/browser-extension-compat-data
          path: compat-data-src
          ssh-key: ${{ secrets.COMPAT_DATA_DEPLOY_KEY }}

      - name: Build compat-data source
        if: steps.compat_src.outcome == 'success'
        working-directory: compat-data-src
        run: |
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Verify generated compat is up to date
        # Regenerates from the built compat-data source and fails if the
        # committed snapshot has drifted. Skips when the source is unavailable.
        # Run `pnpm data:build-compat` to sync.
        run: pnpm verify:compat
        env:
          COMPAT_DATA_DIST: ${{ github.workspace }}/compat-data-src/dist/index.js

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
